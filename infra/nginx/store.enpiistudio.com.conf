# ───── Nginx Proxy Manager — store.enpiistudio.com ─────
#
# Template untuk di-import / paste ke Nginx Proxy Manager
# (Advanced → Custom Nginx Configuration).
#
# Asumsi:
#   - Frontend Next.js di-upstream `web:3000`
#   - Backend Laravel di-upstream `api:8000`
#   - Kedua service berada di docker network `enmarket`
#   - SSL di-terminate oleh Cloudflare Proxy (recommended)
#       atau oleh NPM sendiri (Let's Encrypt via Cloudflare DNS challenge)
#
# Setup di NPM:
#   1. Tambah Proxy Host → store.enpiistudio.com
#   2. Scheme: http  Forward Hostname: web  Port: 3000
#   3. Cache Assets: yes, Block Common Exploits: yes
#   4. Tab SSL → Request SSL via Cloudflare DNS
#   5. Tab Advanced → paste konfigurasi di bawah (bagian location /api/ dan /download/)
#

# ───── API routes — bypass Next.js, langsung ke Laravel ─────
location /api/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_read_timeout 60s;
}

# ───── Signed download endpoint (Fase 4) ─────
location /download/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Download butuh timeout lebih panjang untuk stream file besar
    proxy_read_timeout 300s;
    proxy_buffering off;
}

# ───── Tripay callback (Fase 3) ─────
# Catatan: Tripay mengirim callback ke endpoint API. Karena /api/ sudah di-handle
# di atas, /api/tripay/callback otomatis lewat. Tidak perlu block khusus.

# ───── Next.js on-demand revalidation (Fase 2) ─────
location /api/revalidate {
    # Panggil ke Next.js (bukan Laravel)
    proxy_pass http://web:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ───── Static files dari Next.js ─────
location /_next/static/ {
    proxy_pass http://web:3000;
    proxy_set_header Host $host;
    proxy_cache_valid 200 1y;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# ───── Semua request lain → Next.js ─────
location / {
    proxy_pass http://web:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

