# ───── enmarket — local development stack ─────
# Usage:
#   docker compose -f infra/docker-compose.yml up -d --build
#   docker compose -f infra/docker-compose.yml down

services:
  db:
    image: mysql:8.0
    container_name: enmarket-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-enmarket}
      MYSQL_USER: ${DB_USERNAME:-enmarket}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      # Host port hardcoded ke 3307 agar tidak bentrok dengan MySQL lokal Windows di 3306.
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - enmarket
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: infra/docker/api/Dockerfile
    container_name: enmarket-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      APP_NAME: "enmarket API"
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: "true"
      APP_URL: ${APP_URL:-http://localhost:8000}
      LOG_CHANNEL: stack
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-enmarket}
      DB_USERNAME: ${DB_USERNAME:-enmarket}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      # Tripay (mock di Fase 3) — values supplied via env_file: ../.env
      TRIPAY_MODE: ${TRIPAY_MODE:-sandbox}
      # EnStorage (mock di Fase 4)
      ENSTORAGE_BASE_URL: ${ENSTORAGE_BASE_URL:-}
      # Admin token (Fase 1) — fallback kalau tidak di root .env
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev-admin-token-12345}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3030,http://127.0.0.1:3030}
      # Next.js on-demand revalidation webhook (Fase 2)
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      APP_NEXT_INTERNAL_URL: ${APP_NEXT_INTERNAL_URL:-http://web:3000}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-dev-revalidate-secret}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../apps/api:/var/www/html
      - api_storage:/var/www/html/storage
    networks:
      - enmarket

  web:
    build:
      context: ../apps/web
      dockerfile: ../../infra/docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:8000}
        NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-enpiistudio}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    container_name: enmarket-web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - ../.env
    environment:
      # Dev mode — NODE_ENV default 'development' saat pakai `npm run dev`.
      # Biarkan kosong supaya Next.js auto-set ke 'development'.
      NODE_ENV: ${WEB_NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:8000}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-enpiistudio}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      # Server-side: Next.js (container web) → Laravel (container api).
      # Pakai hostname internal Docker, BUKAN localhost (browser harus pakai
      # localhost:8030 untuk client-side polling — lihat PaymentPoller).
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000}
      # Server-side secret untuk webhook /api/revalidate (Laravel → Next)
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-dev-revalidate-secret}
    ports:
      - "${WEB_PORT:-3000}:3000"
    # ───── Bind mount untuk live coding ─────
    # - ./apps/web (host) → /app (container): source code, Tailwind config,
    #   public/ folder. Edit file di host → Next.js HMR langsung.
    # - Anonymous vols untuk node_modules + .next: pakai versi ter-install
    #   di image (hasil `npm ci` saat build). Tanpa ini, bind mount akan
    #   menimpa dengan folder kosong dari host (host tidak punya deps yang
    #   cocok untuk runtime image).
    volumes:
      - ../apps/web:/app
      - /app/node_modules
      - /app/.next
    # Override CMD: jalankan Next.js dev mode (HMR, Fast Refresh).
    # Image sudah include node_modules + source, jadi `npm run dev` siap pakai.
    command: ["npm", "run", "dev"]
    networks:
      - enmarket

networks:
  enmarket:
    driver: bridge

volumes:
  db_data:
    driver: local
  api_storage:
    driver: local