name: Web CI (Next.js)

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/web/**"
      - "infra/docker/web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/web/**"
      - "infra/docker/web/**"
      - ".github/workflows/web-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_SITE_NAME: "enpiistudio Store"

